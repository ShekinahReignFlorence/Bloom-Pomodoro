<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f9f4ec;
    --petal-1: #f4a7b9;
    --petal-2: #e8799a;
    --petal-3: #d45a7e;
    --leaf: #6a9e72;
    --leaf-dark: #4a7a52;
    --stem: #5c8a60;
    --center: #f5c842;
    --center-dark: #d4a012;
    --text-dark: #2c2018;
    --text-mid: #7a5c48;
    --text-light: #b89a82;
    --bg: #f0ebe0;
    --shadow: rgba(80,40,20,0.12);
    --break-color: #7ab8d4;
    --break-petal: #a8d8ea;
  }

  body {
    background: var(--bg);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(106,158,114,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(244,167,185,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(249,244,236,0.6) 0%, transparent 80%);
    pointer-events: none;
  }

  .deco-leaf { position: fixed; opacity: 0.07; pointer-events: none; }
  .deco-leaf svg { fill: var(--leaf); }
  .deco-leaf:nth-child(1) { top: 5%; left: 3%; transform: rotate(-30deg) scale(1.8); }
  .deco-leaf:nth-child(2) { top: 70%; right: 4%; transform: rotate(40deg) scale(2.2); }
  .deco-leaf:nth-child(3) { bottom: 10%; left: 8%; transform: rotate(15deg) scale(1.4); }
  .deco-leaf:nth-child(4) { top: 15%; right: 10%; transform: rotate(-55deg) scale(1.6); }

  .widget {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }

  .flower-stage {
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flower-svg {
    width: 260px;
    height: 260px;
    filter: drop-shadow(0 12px 32px var(--shadow));
  }

  /* Each petal group rotated around center */
  .petal-group {
    transform-origin: 130px 130px;
  }
  .petal-group:nth-child(1) { transform: rotate(0deg); }
  .petal-group:nth-child(2) { transform: rotate(45deg); }
  .petal-group:nth-child(3) { transform: rotate(90deg); }
  .petal-group:nth-child(4) { transform: rotate(135deg); }
  .petal-group:nth-child(5) { transform: rotate(180deg); }
  .petal-group:nth-child(6) { transform: rotate(225deg); }
  .petal-group:nth-child(7) { transform: rotate(270deg); }
  .petal-group:nth-child(8) { transform: rotate(315deg); }

  /* The actual petal ellipse inside each group */
  .petal-shape {
    transform-origin: 130px 130px;
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.7s ease;
    opacity: 0;
    transform: scale(0.1);
  }
  .petal-shape.bloomed {
    opacity: 1;
    transform: scale(1);
  }

  .progress-ring {
    transition: stroke-dashoffset 1s linear;
    transform-origin: 130px 130px;
    transform: rotate(-90deg);
  }

  .flower-svg.running .stem-group {
    animation: sway 4s ease-in-out infinite;
    transform-origin: 130px 240px;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }

  @keyframes bloomBurst {
    0% { transform: scale(1); }
    30% { transform: scale(1.07); }
    70% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  .flower-svg.blooming { animation: bloomBurst 0.6s ease forwards; }

  /* Card */
  .card {
    background: rgba(255,252,247,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 28px;
    padding: 32px 36px 28px;
    width: 320px;
    box-shadow: 0 2px 0 rgba(255,255,255,0.8) inset, 0 16px 48px var(--shadow), 0 4px 12px rgba(0,0,0,0.06);
    margin-top: -24px;
    position: relative;
    z-index: 2;
  }

  .mode-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 4px;
    transition: color 0.4s;
  }
  .mode-label.break { color: var(--break-color); }

  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    color: var(--text-dark);
    text-align: center;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 6px;
    transition: color 0.4s;
  }
  .timer-display.break { color: #4a8fa8; }

  .session-info {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 24px;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
  }

  .btn { border: none; cursor: pointer; font-family: 'Karla', sans-serif; transition: all 0.2s ease; outline: none; }
  .btn:active { transform: scale(0.95); }

  .btn-main {
    background: linear-gradient(135deg, var(--petal-2), var(--petal-3));
    color: white;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 12px 28px;
    border-radius: 100px;
    box-shadow: 0 4px 16px rgba(212,90,126,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
  }
  .btn-main:hover { box-shadow: 0 6px 20px rgba(212,90,126,0.45); transform: translateY(-1px); }
  .btn-main.break-btn {
    background: linear-gradient(135deg, var(--break-petal), var(--break-color));
    box-shadow: 0 4px 16px rgba(122,184,212,0.35);
  }

  .btn-secondary {
    background: rgba(200,180,160,0.15);
    color: var(--text-mid);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 100px;
    border: 1px solid rgba(200,180,160,0.3);
  }
  .btn-secondary:hover { background: rgba(200,180,160,0.25); }

  .petals-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .petal-dot {
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: rgba(200,180,170,0.2);
    border: 1px solid rgba(200,180,170,0.35);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .petal-dot:nth-child(1) { transform: rotate(0deg); }
  .petal-dot:nth-child(2) { transform: rotate(45deg); }
  .petal-dot:nth-child(3) { transform: rotate(90deg); }
  .petal-dot:nth-child(4) { transform: rotate(135deg); }
  .petal-dot:nth-child(5) { transform: rotate(180deg); }
  .petal-dot:nth-child(6) { transform: rotate(225deg); }
  .petal-dot:nth-child(7) { transform: rotate(270deg); }
  .petal-dot:nth-child(8) { transform: rotate(315deg); }

  .petal-dot.bloomed {
    background: linear-gradient(135deg, var(--petal-1), var(--petal-2));
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(244,167,185,0.4);
  }

  .settings-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .time-btn {
    background: rgba(200,180,160,0.12);
    border: 1px solid rgba(200,180,160,0.25);
    color: var(--text-mid);
    font-size: 10.5px;
    font-family: 'Karla', sans-serif;
    padding: 5px 10px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .time-btn:hover { background: rgba(200,180,160,0.25); }
  .time-btn.active {
    background: linear-gradient(135deg, var(--petal-1), var(--petal-2));
    border-color: transparent;
    color: white;
    box-shadow: 0 2px 8px rgba(244,167,185,0.35);
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark);
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-light);
    letter-spacing: 0.12em;
    margin-bottom: 18px;
    text-align: center;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>

<div class="widget">
  <p class="app-title">bloom · focus timer</p>

  <div class="flower-stage">
    <svg class="flower-svg" id="flowerSvg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="petalGrad" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#f9c8d8"/>
          <stop offset="100%" stop-color="#d45a7e"/>
        </radialGradient>
        <radialGradient id="petalGrad2" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#f4a7b9"/>
          <stop offset="100%" stop-color="#c44870"/>
        </radialGradient>
        <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#fde68a"/>
          <stop offset="100%" stop-color="#d4a012"/>
        </radialGradient>
        <filter id="softShadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(100,40,60,0.15)"/>
        </filter>
      </defs>

      <!-- Progress ring track -->
      <circle cx="130" cy="130" r="108" fill="none" stroke="rgba(200,160,170,0.15)" stroke-width="4"/>
      <circle id="progressRing" class="progress-ring" cx="130" cy="130" r="108"
        fill="none" stroke="url(#petalGrad)" stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="678.6" stroke-dashoffset="678.6"/>

      <!-- Leaves -->
      <g class="stem-group">
        <ellipse cx="90" cy="175" rx="22" ry="11" fill="#6a9e72" transform="rotate(-35 90 175)" opacity="0.9"/>
        <ellipse cx="170" cy="178" rx="22" ry="11" fill="#5c8a60" transform="rotate(30 170 178)" opacity="0.9"/>
      </g>

      <!-- 8 Petals — each group rotated, petal-shape handles bloom -->
      <g id="petalsGroup" filter="url(#softShadow)">
        <g class="petal-group"><ellipse class="petal-shape" id="ps1" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps2" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps3" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps4" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps5" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps6" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps7" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
        <g class="petal-group"><ellipse class="petal-shape" id="ps8" cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/></g>
      </g>

      <!-- Center -->
      <circle cx="130" cy="130" r="26" fill="url(#centerGrad)" filter="url(#softShadow)"/>
      <circle cx="124" cy="124" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="130" cy="121" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="136" cy="124" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="122" cy="130" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="134" cy="130" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="125" cy="136" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="131" cy="137" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="124" cy="122" r="7"   fill="rgba(255,240,180,0.25)"/>
    </svg>
  </div>

  <div class="card">
    <div class="mode-label" id="modeLabel">FOCUS SESSION</div>
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="session-info" id="sessionInfo">petal 1 of 8 · stay focused 🌱</div>

    <div class="petals-row" id="petalsRow">
      <div class="petal-dot" id="dot1"></div>
      <div class="petal-dot" id="dot2"></div>
      <div class="petal-dot" id="dot3"></div>
      <div class="petal-dot" id="dot4"></div>
      <div class="petal-dot" id="dot5"></div>
      <div class="petal-dot" id="dot6"></div>
      <div class="petal-dot" id="dot7"></div>
      <div class="petal-dot" id="dot8"></div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" onclick="resetTimer()">↺ Reset</button>
      <button class="btn btn-main" id="mainBtn" onclick="toggleTimer()">Start</button>
      <button class="btn btn-secondary" onclick="skipSession()">Skip ›</button>
    </div>

    <div class="settings-row">
      <button class="time-btn active" onclick="setFocusTime(25, this)">25 min</button>
      <button class="time-btn" onclick="setFocusTime(45, this)">45 min</button>
      <button class="time-btn" onclick="setFocusTime(90, this)">90 min</button>
      <button class="time-btn" onclick="setBreakTime(5, this)">5 break</button>
      <button class="time-btn" onclick="setBreakTime(15, this)">15 break</button>
      <button class="time-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let focusMinutes = 25;
  let breakMinutes = 5;
  let totalSeconds = focusMinutes * 60;
  let remainingSeconds = totalSeconds;
  let isRunning = false;
  let isBreak = false;
  let bloomedPetals = 0;          // how many petals currently showing
  let lastPetalAt = 0;            // elapsed seconds when last petal bloomed

  // For background-safe timing
  let tickInterval = null;
  let startTimestamp = null;      // Date.now() when timer was last started/resumed
  let secondsWhenStarted = 0;    // remainingSeconds at that moment

  const TOTAL_PETALS = 8;
  const CIRCUMFERENCE = 2 * Math.PI * 108; // 678.6

  // ── DOM refs ───────────────────────────────────────────
  const timerDisplay  = document.getElementById('timerDisplay');
  const modeLabel     = document.getElementById('modeLabel');
  const sessionInfo   = document.getElementById('sessionInfo');
  const mainBtn       = document.getElementById('mainBtn');
  const progressRing  = document.getElementById('progressRing');
  const flowerSvg     = document.getElementById('flowerSvg');

  // ── Helpers ────────────────────────────────────────────
  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function petalThreshold(n) {
    // Returns elapsed focus seconds at which petal n (1-based) should bloom
    // Evenly spaced across the focus session
    return Math.round((n / TOTAL_PETALS) * totalSeconds);
  }

  // ── Render ─────────────────────────────────────────────
  function renderDisplay() {
    timerDisplay.textContent = fmt(remainingSeconds);

    const elapsed = totalSeconds - remainingSeconds;
    const progress = elapsed / totalSeconds;
    progressRing.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

    if (isBreak) {
      progressRing.setAttribute('stroke', '#7ab8d4');
      timerDisplay.classList.add('break');
      modeLabel.classList.add('break');
      mainBtn.classList.add('break-btn');
      modeLabel.textContent = 'BREAK TIME';
    } else {
      progressRing.setAttribute('stroke', 'url(#petalGrad)');
      timerDisplay.classList.remove('break');
      modeLabel.classList.remove('break');
      mainBtn.classList.remove('break-btn');
      modeLabel.textContent = 'FOCUS SESSION';
    }
  }

  function renderPetals() {
    for (let i = 1; i <= TOTAL_PETALS; i++) {
      const shape = document.getElementById(`ps${i}`);
      const dot   = document.getElementById(`dot${i}`);
      if (i <= bloomedPetals) {
        shape.classList.add('bloomed');
        dot.classList.add('bloomed');
      } else {
        shape.classList.remove('bloomed');
        dot.classList.remove('bloomed');
      }
    }
    if (isBreak) {
      sessionInfo.textContent = `take a breath 🌿 · break time`;
    } else if (bloomedPetals >= TOTAL_PETALS) {
      sessionInfo.textContent = `full bloom achieved ✦`;
    } else {
      const elapsed = totalSeconds - remainingSeconds;
      const nextAt  = petalThreshold(bloomedPetals + 1);
      const secsToNext = nextAt - elapsed;
      sessionInfo.textContent = `petal ${bloomedPetals + 1} of 8 · next bloom in ${fmt(Math.max(0, secsToNext))}`;
    }
  }

  // ── Petal bloom check (called every second during focus) ──
  function checkPetalBloom() {
    if (isBreak) return;
    const elapsed = totalSeconds - remainingSeconds;
    // Bloom each petal when its threshold is crossed
    for (let n = bloomedPetals + 1; n <= TOTAL_PETALS; n++) {
      if (elapsed >= petalThreshold(n)) {
        bloomedPetals = n;
        renderPetals();
        burstFlower();
        playPetalBloom();
        if (n < TOTAL_PETALS) showToast(`🌸 Petal ${n} bloomed! Keep going!`);
        else showToast(`🌸 Full bloom! Session complete!`);
      } else {
        break; // thresholds are in order, no need to check further
      }
    }
  }

  function burstFlower() {
    flowerSvg.classList.remove('blooming');
    void flowerSvg.offsetWidth; // reflow to restart animation
    flowerSvg.classList.add('blooming');
    setTimeout(() => flowerSvg.classList.remove('blooming'), 700);
  }

  // ── Timer core (timestamp-based = works when minimized) ──
  function tick() {
    // Calculate actual elapsed wall-clock time since start/resume
    const wallElapsed = Math.floor((Date.now() - startTimestamp) / 1000);
    remainingSeconds  = Math.max(0, secondsWhenStarted - wallElapsed);

    renderDisplay();
    checkPetalBloom();
    renderPetals();

    if (remainingSeconds <= 0) {
      sessionComplete();
    }
  }

  function startTimer() {
    isRunning          = true;
    startTimestamp     = Date.now();
    secondsWhenStarted = remainingSeconds;
    mainBtn.textContent = 'Pause';
    flowerSvg.classList.add('running');
    playResumeSound();
    tickInterval = setInterval(tick, 500); // 500ms for accuracy
  }

  function pauseTimer() {
    isRunning = false;
    clearInterval(tickInterval);
    tickInterval = null;
    mainBtn.textContent = 'Resume';
    flowerSvg.classList.remove('running');
    playPauseSound();
  }

  function toggleTimer() {
    isRunning ? pauseTimer() : startTimer();
  }

  function resetTimer() {
    clearInterval(tickInterval);
    tickInterval       = null;
    isRunning          = false;
    isBreak            = false;
    bloomedPetals      = 0;
    totalSeconds       = focusMinutes * 60;
    remainingSeconds   = totalSeconds;
    startTimestamp     = null;
    secondsWhenStarted = 0;

    mainBtn.textContent = 'Start';
    mainBtn.classList.remove('break-btn');
    flowerSvg.classList.remove('running', 'blooming');

    renderDisplay();
    renderPetals();
    playResetSound();
    showToast('🌱 Timer reset — fresh start!');
  }

  function sessionComplete() {
    clearInterval(tickInterval);
    tickInterval = null;
    isRunning    = false;
    flowerSvg.classList.remove('running');
    playChime();

    if (!isBreak) {
      // Focus done
      isBreak            = true;
      totalSeconds       = breakMinutes * 60;
      remainingSeconds   = totalSeconds;
      mainBtn.textContent = 'Start Break';
      playBreakSound();
      showToast('🌸 Focus done! All petals bloomed — take a break!');
    } else {
      // Break done → new focus session, reset petals
      isBreak            = false;
      bloomedPetals      = 0;
      totalSeconds       = focusMinutes * 60;
      remainingSeconds   = totalSeconds;
      mainBtn.textContent = 'Start Focus';
      showToast('🌿 Break over — ready to bloom again!');
    }

    renderDisplay();
    renderPetals();
  }

  function skipSession() {
    if (isRunning) pauseTimer();
    sessionComplete();
  }

  // ── Settings ───────────────────────────────────────────
  function setFocusTime(minutes, btn) {
    focusMinutes = minutes;
    document.querySelectorAll('.time-btn').forEach(b => {
      if (['25 min','45 min','90 min'].includes(b.textContent)) b.classList.remove('active');
    });
    btn.classList.add('active');
    if (!isRunning && !isBreak) {
      totalSeconds     = focusMinutes * 60;
      remainingSeconds = totalSeconds;
      renderDisplay();
      renderPetals();
    }
    showToast(`Focus set to ${minutes} min`);
  }

  function setBreakTime(minutes, btn) {
    breakMinutes = minutes;
    document.querySelectorAll('.time-btn').forEach(b => {
      if (['5 break','15 break'].includes(b.textContent)) b.classList.remove('active');
    });
    btn.classList.add('active');
    if (!isRunning && isBreak) {
      totalSeconds     = breakMinutes * 60;
      remainingSeconds = totalSeconds;
      renderDisplay();
    }
    showToast(`Break set to ${minutes} min`);
  }

  // ── Toast ──────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Audio System ───────────────────────────────────────
  let isMuted = false;
  let audioCtx = null;

  // Unlock audio context on first user interaction (browser requirement)
  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  document.addEventListener('click', unlockAudio, { once: false });
  document.addEventListener('keydown', unlockAudio, { once: false });

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('muteBtn');
    btn.textContent = isMuted ? '🔇' : '🔊';
    showToast(isMuted ? 'Sound off 🔇' : 'Sound on 🔊');
  }

  // Helper: create a note with envelope
  function note(ctx, freq, type, vol, startTime, attackTime, decayTime) {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + attackTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + decayTime);
    osc.start(startTime);
    osc.stop(startTime + decayTime + 0.05);
  }

  // 🌸 Petal bloom — magical harp pluck + fairy shimmer
  // Sounds like a flower petal gently opening
  function playPetalBloom() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      const t   = ctx.currentTime;

      // Harp pluck: root + octave + fifth (warm triangle waves)
      note(ctx, 523.25, 'triangle', 0.20, t,        0.01, 1.6); // C5
      note(ctx, 783.99, 'triangle', 0.12, t + 0.04, 0.01, 1.4); // G5
      note(ctx, 1046.5, 'triangle', 0.07, t + 0.08, 0.01, 1.2); // C6

      // Fairy shimmer — two high sine waves slightly detuned (chorus effect)
      note(ctx, 2093.0, 'sine', 0.05, t + 0.02, 0.01, 0.5); // C7
      note(ctx, 2109.0, 'sine', 0.04, t + 0.02, 0.01, 0.5); // slightly detuned

      // Soft low warmth
      note(ctx, 261.63, 'sine', 0.08, t, 0.02, 1.0); // C4 bass

    } catch(e) { console.warn('Audio error:', e); }
  }

  // 🎉 Full session complete — celebratory ascending arpeggio
  // Sounds like a reward/achievement unlocked
  function playChime() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      // Ascending C major arpeggio with warm overtones
      const melody = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.5];
      melody.forEach((freq, i) => {
        const t = ctx.currentTime + i * 0.13;
        note(ctx, freq,       'sine',     0.16, t, 0.02, 0.9);
        note(ctx, freq * 2,   'triangle', 0.05, t, 0.02, 0.7); // octave shimmer
      });
      // Final sustain chord
      const chord = [523.25, 659.25, 783.99];
      chord.forEach((freq, i) => {
        note(ctx, freq, 'sine', 0.10, ctx.currentTime + 0.9, 0.03, 1.5);
      });
    } catch(e) {}
  }

  // 🌿 Break time — soft descending lullaby, calming and warm
  function playBreakSound() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      // Gentle descending: G5 → E5 → C5 → G4
      [[783.99, 0], [659.25, 0.2], [523.25, 0.4], [392.00, 0.65]].forEach(([freq, delay]) => {
        note(ctx, freq, 'sine', 0.14, ctx.currentTime + delay, 0.04, 1.2);
        note(ctx, freq, 'triangle', 0.04, ctx.currentTime + delay, 0.04, 1.0);
      });
    } catch(e) {}
  }

  // 🚀 Start/resume — bright two-note upward cue, energizing
  function playResumeSound() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      note(ctx, 523.25, 'sine', 0.13, ctx.currentTime,        0.02, 0.4); // C5
      note(ctx, 783.99, 'sine', 0.16, ctx.currentTime + 0.12, 0.02, 0.5); // G5
      note(ctx, 1046.5, 'sine', 0.09, ctx.currentTime + 0.22, 0.02, 0.4); // C6
    } catch(e) {}
  }

  // ⏸ Pause — soft single descending tone, like pressing pause on music
  function playPauseSound() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      note(ctx, 659.25, 'sine', 0.12, ctx.currentTime,        0.02, 0.4); // E5
      note(ctx, 523.25, 'sine', 0.10, ctx.currentTime + 0.12, 0.02, 0.5); // C5
    } catch(e) {}
  }

  // 🌱 Reset — gentle single soft chime, clean slate
  function playResetSound() {
    if (isMuted) return;
    try {
      const ctx = getCtx();
      note(ctx, 392.00, 'triangle', 0.12, ctx.currentTime,        0.02, 0.8); // G4
      note(ctx, 523.25, 'sine',     0.08, ctx.currentTime + 0.15, 0.02, 0.6); // C5
    } catch(e) {}
  }

  // ── Page visibility: re-sync when tab comes back ───────
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isRunning) {
      // Re-sync: recalculate remaining from wall clock
      tick();
    }
  });

  // ── Init ───────────────────────────────────────────────
  renderDisplay();
  renderPetals();
</script>
</body>
</html>
