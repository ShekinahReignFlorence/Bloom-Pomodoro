<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f9f4ec;
    --petal-1: #f4a7b9;
    --petal-2: #e8799a;
    --petal-3: #d45a7e;
    --leaf: #6a9e72;
    --leaf-dark: #4a7a52;
    --stem: #5c8a60;
    --center: #f5c842;
    --center-dark: #d4a012;
    --text-dark: #2c2018;
    --text-mid: #7a5c48;
    --text-light: #b89a82;
    --bg: #f0ebe0;
    --shadow: rgba(80,40,20,0.12);
    --break-color: #7ab8d4;
    --break-petal: #a8d8ea;
  }

  body {
    background: var(--bg);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Soft botanical background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(106,158,114,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(244,167,185,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(249,244,236,0.6) 0%, transparent 80%);
    pointer-events: none;
  }

  /* Floating leaves decoration */
  .deco-leaf {
    position: fixed;
    opacity: 0.07;
    pointer-events: none;
  }
  .deco-leaf svg { fill: var(--leaf); }
  .deco-leaf:nth-child(1) { top: 5%; left: 3%; transform: rotate(-30deg) scale(1.8); }
  .deco-leaf:nth-child(2) { top: 70%; right: 4%; transform: rotate(40deg) scale(2.2); }
  .deco-leaf:nth-child(3) { bottom: 10%; left: 8%; transform: rotate(15deg) scale(1.4); }
  .deco-leaf:nth-child(4) { top: 15%; right: 10%; transform: rotate(-55deg) scale(1.6); }

  .widget {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 1;
  }

  /* === FLOWER SVG STAGE === */
  .flower-stage {
    width: 280px;
    height: 280px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flower-svg {
    width: 260px;
    height: 260px;
    filter: drop-shadow(0 12px 32px var(--shadow));
  }

  /* Petal animations */
  .petal { transform-origin: 130px 145px; transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .petal.hidden { opacity: 0; transform: scale(0.2) rotate(var(--start-angle)); }
  .petal.visible { opacity: 1; transform: scale(1) rotate(0deg); }

  /* Each petal rotated around center */
  .p1 { --start-angle: 0deg; }
  .p2 { transform: rotate(45deg); --start-angle: 45deg; }
  .p3 { transform: rotate(90deg); --start-angle: 90deg; }
  .p4 { transform: rotate(135deg); --start-angle: 135deg; }
  .p5 { transform: rotate(180deg); --start-angle: 180deg; }
  .p6 { transform: rotate(225deg); --start-angle: 225deg; }
  .p7 { transform: rotate(270deg); --start-angle: 270deg; }
  .p8 { transform: rotate(315deg); --start-angle: 315deg; }

  .p1.hidden { opacity: 0; transform: rotate(0deg) scale(0.2); }
  .p2.hidden { opacity: 0; transform: rotate(45deg) scale(0.2); }
  .p3.hidden { opacity: 0; transform: rotate(90deg) scale(0.2); }
  .p4.hidden { opacity: 0; transform: rotate(135deg) scale(0.2); }
  .p5.hidden { opacity: 0; transform: rotate(180deg) scale(0.2); }
  .p6.hidden { opacity: 0; transform: rotate(225deg) scale(0.2); }
  .p7.hidden { opacity: 0; transform: rotate(270deg) scale(0.2); }
  .p8.hidden { opacity: 0; transform: rotate(315deg) scale(0.2); }

  .petal.hidden { transform-origin: 130px 145px; }
  .p2.hidden { transform-origin: 130px 145px; }

  /* Center pulse */
  .flower-center {
    animation: centerPulse 3s ease-in-out infinite;
  }
  @keyframes centerPulse {
    0%, 100% { r: 22; }
    50% { r: 24; }
  }
  .flower-center-inner {
    animation: centerPulse 3s ease-in-out infinite;
  }

  /* Ring progress */
  .progress-ring {
    transition: stroke-dashoffset 1s linear;
    transform-origin: 130px 130px;
    transform: rotate(-90deg);
  }

  /* Gentle sway when running */
  .flower-svg.running .stem-group {
    animation: sway 4s ease-in-out infinite;
    transform-origin: 130px 240px;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }

  /* === CARD === */
  .card {
    background: rgba(255,252,247,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 28px;
    padding: 32px 36px 28px;
    width: 320px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.8) inset,
      0 16px 48px var(--shadow),
      0 4px 12px rgba(0,0,0,0.06);
    margin-top: -24px;
    position: relative;
    z-index: 2;
  }

  .mode-label {
    font-family: 'Karla', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 4px;
    transition: color 0.4s;
  }
  .mode-label.break { color: var(--break-color); }

  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 300;
    color: var(--text-dark);
    text-align: center;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 6px;
    transition: color 0.4s;
  }
  .timer-display.break { color: #4a8fa8; }

  .session-info {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 24px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: 'Karla', sans-serif;
    transition: all 0.2s ease;
    outline: none;
  }
  .btn:active { transform: scale(0.95); }

  .btn-main {
    background: linear-gradient(135deg, var(--petal-2), var(--petal-3));
    color: white;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 12px 28px;
    border-radius: 100px;
    box-shadow: 0 4px 16px rgba(212,90,126,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
  }
  .btn-main:hover { box-shadow: 0 6px 20px rgba(212,90,126,0.45); transform: translateY(-1px); }
  .btn-main.break-btn {
    background: linear-gradient(135deg, var(--break-petal), var(--break-color));
    box-shadow: 0 4px 16px rgba(122,184,212,0.35);
  }

  .btn-secondary {
    background: rgba(200,180,160,0.15);
    color: var(--text-mid);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 100px;
    border: 1px solid rgba(200,180,160,0.3);
  }
  .btn-secondary:hover { background: rgba(200,180,160,0.25); }

  /* Petals tracker */
  .petals-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .petal-dot {
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: rgba(200,180,170,0.2);
    border: 1px solid rgba(200,180,170,0.35);
    transform: rotate(var(--rot));
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .petal-dot:nth-child(1) { --rot: 0deg; }
  .petal-dot:nth-child(2) { --rot: 45deg; }
  .petal-dot:nth-child(3) { --rot: 90deg; }
  .petal-dot:nth-child(4) { --rot: 135deg; }
  .petal-dot:nth-child(5) { --rot: 180deg; }
  .petal-dot:nth-child(6) { --rot: 225deg; }
  .petal-dot:nth-child(7) { --rot: 270deg; }
  .petal-dot:nth-child(8) { --rot: 315deg; }

  .petal-dot.bloomed {
    background: linear-gradient(135deg, var(--petal-1), var(--petal-2));
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(244,167,185,0.4);
  }

  /* Settings row */
  .settings-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .time-btn {
    background: rgba(200,180,160,0.12);
    border: 1px solid rgba(200,180,160,0.25);
    color: var(--text-mid);
    font-size: 10.5px;
    font-family: 'Karla', sans-serif;
    padding: 5px 10px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .time-btn:hover { background: rgba(200,180,160,0.25); }
  .time-btn.active {
    background: linear-gradient(135deg, var(--petal-1), var(--petal-2));
    border-color: transparent;
    color: white;
    box-shadow: 0 2px 8px rgba(244,167,185,0.35);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark);
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Bloom burst animation */
  @keyframes bloomBurst {
    0% { transform: scale(1); }
    30% { transform: scale(1.08); }
    60% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  .flower-svg.blooming { animation: bloomBurst 0.7s ease forwards; }

  /* Title */
  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-light);
    letter-spacing: 0.12em;
    margin-bottom: 18px;
    text-align: center;
    opacity: 0.8;
  }
</style>
</head>
<body>

<!-- Decorative leaves -->
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>
<div class="deco-leaf"><svg viewBox="0 0 80 120" width="80"><path d="M40 0 C60 30 75 60 40 120 C5 60 20 30 40 0Z"/></svg></div>

<div class="widget">
  <p class="app-title">bloom · focus timer</p>

  <!-- Flower -->
  <div class="flower-stage">
    <svg class="flower-svg" id="flowerSvg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="petalGrad" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#f9c8d8"/>
          <stop offset="100%" stop-color="#d45a7e"/>
        </radialGradient>
        <radialGradient id="petalGrad2" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#f4a7b9"/>
          <stop offset="100%" stop-color="#c44870"/>
        </radialGradient>
        <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#fde68a"/>
          <stop offset="100%" stop-color="#d4a012"/>
        </radialGradient>
        <radialGradient id="breakPetalGrad" cx="50%" cy="70%" r="60%">
          <stop offset="0%" stop-color="#c8e8f4"/>
          <stop offset="100%" stop-color="#5a9eb8"/>
        </radialGradient>
        <filter id="softShadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(100,40,60,0.15)"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Progress ring track -->
      <circle cx="130" cy="130" r="108" fill="none" stroke="rgba(200,160,170,0.15)" stroke-width="4"/>
      <!-- Progress ring -->
      <circle id="progressRing" class="progress-ring" cx="130" cy="130" r="108"
        fill="none" stroke="url(#petalGrad)" stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="678.6" stroke-dashoffset="678.6"/>

      <!-- Leaves (behind petals) -->
      <g id="leafGroup">
        <ellipse cx="90" cy="175" rx="22" ry="11" fill="#6a9e72" transform="rotate(-35 90 175)" opacity="0.9"/>
        <ellipse cx="170" cy="178" rx="22" ry="11" fill="#5c8a60" transform="rotate(30 170 178)" opacity="0.9"/>
        <line x1="90" y1="175" x2="85" y2="165" stroke="#4a7a52" stroke-width="1" opacity="0.5"/>
        <line x1="170" y1="178" x2="175" y2="168" stroke="#4a7a52" stroke-width="1" opacity="0.5"/>
      </g>

      <!-- Petals group - 8 petals -->
      <g id="petalsGroup" filter="url(#softShadow)">
        <!-- Petal shape: ellipse pointing up, pivoting around center (130,130) -->

        <!-- p1: top (0°) -->
        <g class="petal p1 hidden" id="petal1">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p2: top-right (45°) -->
        <g class="petal p2 hidden" id="petal2" style="transform-origin:130px 130px; transform:rotate(45deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p3: right (90°) -->
        <g class="petal p3 hidden" id="petal3" style="transform-origin:130px 130px; transform:rotate(90deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p4: bottom-right (135°) -->
        <g class="petal p4 hidden" id="petal4" style="transform-origin:130px 130px; transform:rotate(135deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p5: bottom (180°) -->
        <g class="petal p5 hidden" id="petal5" style="transform-origin:130px 130px; transform:rotate(180deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p6: bottom-left (225°) -->
        <g class="petal p6 hidden" id="petal6" style="transform-origin:130px 130px; transform:rotate(225deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p7: left (270°) -->
        <g class="petal p7 hidden" id="petal7" style="transform-origin:130px 130px; transform:rotate(270deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
        <!-- p8: top-left (315°) -->
        <g class="petal p8 hidden" id="petal8" style="transform-origin:130px 130px; transform:rotate(315deg)">
          <ellipse cx="130" cy="88" rx="18" ry="40" fill="url(#petalGrad)"/>
          <ellipse cx="130" cy="95" rx="8" ry="22" fill="url(#petalGrad2)" opacity="0.35"/>
        </g>
      </g>

      <!-- Flower center -->
      <circle cx="130" cy="130" r="26" fill="url(#centerGrad)" filter="url(#softShadow)"/>
      <!-- Center texture dots -->
      <circle cx="124" cy="124" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="130" cy="121" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="136" cy="124" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="122" cy="130" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="128" cy="130" r="2" fill="rgba(180,120,0,0.25)"/>
      <circle cx="134" cy="130" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="138" cy="130" r="2" fill="rgba(180,120,0,0.25)"/>
      <circle cx="125" cy="136" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="131" cy="137" r="2.5" fill="rgba(180,120,0,0.3)"/>
      <circle cx="137" cy="135" r="2" fill="rgba(180,120,0,0.25)"/>
      <!-- Center highlight -->
      <circle cx="124" cy="122" r="7" fill="rgba(255,240,180,0.25)"/>
    </svg>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="mode-label" id="modeLabel">FOCUS SESSION</div>
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="session-info" id="sessionInfo">petal 1 of 8</div>

    <!-- Petal tracker dots -->
    <div class="petals-row" id="petalsRow">
      <div class="petal-dot" id="dot1"></div>
      <div class="petal-dot" id="dot2"></div>
      <div class="petal-dot" id="dot3"></div>
      <div class="petal-dot" id="dot4"></div>
      <div class="petal-dot" id="dot5"></div>
      <div class="petal-dot" id="dot6"></div>
      <div class="petal-dot" id="dot7"></div>
      <div class="petal-dot" id="dot8"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-secondary" id="resetBtn" onclick="resetTimer()">↺ Reset</button>
      <button class="btn btn-main" id="mainBtn" onclick="toggleTimer()">Start</button>
      <button class="btn btn-secondary" onclick="skipSession()">Skip ›</button>
    </div>

    <!-- Time presets -->
    <div class="settings-row">
      <button class="time-btn active" onclick="setFocusTime(25, this)">25 min</button>
      <button class="time-btn" onclick="setFocusTime(45, this)">45 min</button>
      <button class="time-btn" onclick="setFocusTime(90, this)">90 min</button>
      <button class="time-btn" onclick="setBreakTime(5, this)">5 break</button>
      <button class="time-btn" onclick="setBreakTime(15, this)">15 break</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let focusMinutes = 25;
  let breakMinutes = 5;
  let currentSeconds = focusMinutes * 60;
  let isRunning = false;
  let isBreak = false;
  let interval = null;
  let completedSessions = 0;
  const TOTAL_PETALS = 8;

  const CIRCUMFERENCE = 2 * Math.PI * 108; // 678.6

  // DOM refs
  const timerDisplay = document.getElementById('timerDisplay');
  const modeLabel = document.getElementById('modeLabel');
  const sessionInfo = document.getElementById('sessionInfo');
  const mainBtn = document.getElementById('mainBtn');
  const progressRing = document.getElementById('progressRing');
  const flowerSvg = document.getElementById('flowerSvg');

  function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function updateDisplay() {
    timerDisplay.textContent = formatTime(currentSeconds);
    const total = isBreak ? breakMinutes * 60 : focusMinutes * 60;
    const elapsed = total - currentSeconds;
    const progress = elapsed / total;
    const offset = CIRCUMFERENCE * (1 - progress);
    progressRing.style.strokeDashoffset = offset;

    // Update ring color for break
    if (isBreak) {
      progressRing.setAttribute('stroke', '#7ab8d4');
      timerDisplay.classList.add('break');
      modeLabel.classList.add('break');
      mainBtn.classList.add('break-btn');
    } else {
      progressRing.setAttribute('stroke', 'url(#petalGrad)');
      timerDisplay.classList.remove('break');
      modeLabel.classList.remove('break');
      mainBtn.classList.remove('break-btn');
    }
  }

  function updatePetalDots() {
    for (let i = 1; i <= TOTAL_PETALS; i++) {
      const dot = document.getElementById(`dot${i}`);
      if (i <= completedSessions) {
        dot.classList.add('bloomed');
      } else {
        dot.classList.remove('bloomed');
      }
    }
  }

  function bloomPetal(index) {
    const petal = document.getElementById(`petal${index}`);
    if (!petal) return;
    // Remove hidden to trigger transition
    petal.classList.remove('hidden');
    // Add blooming burst to whole flower
    flowerSvg.classList.add('blooming');
    setTimeout(() => flowerSvg.classList.remove('blooming'), 700);
  }

  function updateSessionInfo() {
    if (isBreak) {
      sessionInfo.textContent = `take a breath · break ${Math.ceil(completedSessions / 1)} of 8`;
    } else {
      const next = completedSessions + 1;
      if (completedSessions >= TOTAL_PETALS) {
        sessionInfo.textContent = `full bloom achieved ✦`;
      } else {
        sessionInfo.textContent = `petal ${next} of 8`;
      }
    }
  }

  function toggleTimer() {
    if (isRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  function startTimer() {
    isRunning = true;
    mainBtn.textContent = 'Pause';
    flowerSvg.classList.add('running');
    interval = setInterval(() => {
      currentSeconds--;
      updateDisplay();
      if (currentSeconds <= 0) {
        sessionComplete();
      }
    }, 1000);
  }

  function pauseTimer() {
    isRunning = false;
    mainBtn.textContent = 'Resume';
    flowerSvg.classList.remove('running');
    clearInterval(interval);
  }

  function resetTimer() {
    clearInterval(interval);
    isRunning = false;
    isBreak = false;
    currentSeconds = focusMinutes * 60;
    modeLabel.textContent = 'FOCUS SESSION';
    mainBtn.textContent = 'Start';
    mainBtn.classList.remove('break-btn');
    flowerSvg.classList.remove('running');
    updateDisplay();
    updateSessionInfo();
  }

  function sessionComplete() {
    clearInterval(interval);
    isRunning = false;
    flowerSvg.classList.remove('running');

    if (!isBreak) {
      // Focus session done → bloom a petal
      completedSessions = Math.min(completedSessions + 1, TOTAL_PETALS);
      bloomPetal(completedSessions);
      updatePetalDots();
      showToast(completedSessions >= TOTAL_PETALS
        ? '🌸 Full bloom! All 8 petals complete!'
        : `🌸 Petal ${completedSessions} bloomed! Take a break.`);
      // Switch to break
      isBreak = true;
      currentSeconds = breakMinutes * 60;
      modeLabel.textContent = 'BREAK TIME';
      mainBtn.textContent = 'Start Break';
    } else {
      // Break done → back to focus
      isBreak = false;
      currentSeconds = focusMinutes * 60;
      modeLabel.textContent = 'FOCUS SESSION';
      mainBtn.textContent = 'Start Focus';
      showToast('🌿 Break over — ready to focus!');
    }

    updateDisplay();
    updateSessionInfo();
    playChime();
  }

  function skipSession() {
    if (isRunning) pauseTimer();
    sessionComplete();
  }

  function setFocusTime(minutes, btn) {
    focusMinutes = minutes;
    document.querySelectorAll('.time-btn').forEach(b => {
      if (['25 min','45 min','90 min'].includes(b.textContent)) b.classList.remove('active');
    });
    btn.classList.add('active');
    if (!isRunning && !isBreak) {
      currentSeconds = focusMinutes * 60;
      updateDisplay();
    }
    showToast(`Focus set to ${minutes} min`);
  }

  function setBreakTime(minutes, btn) {
    breakMinutes = minutes;
    document.querySelectorAll('.time-btn').forEach(b => {
      if (['5 break','15 break'].includes(b.textContent)) b.classList.remove('active');
    });
    btn.classList.add('active');
    if (!isRunning && isBreak) {
      currentSeconds = breakMinutes * 60;
      updateDisplay();
    }
    showToast(`Break set to ${minutes} min`);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        const t = ctx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.18, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        osc.start(t); osc.stop(t + 0.8);
      });
    } catch(e) {}
  }

  // Init
  updateDisplay();
  updateSessionInfo();
</script>
</body>
</html>
